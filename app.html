<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta property="og:title" content="ExamForge - Dashboard">
    <meta property="og:description" content="Discipline. Direction. Distinction. Practice exams, track your progress, and ace your tests with confidence.">
    <meta property="og:image" content="https://examforge.com.ng/examforge.jpeg">
    <meta property="og:url" content="https://examforge.com.ng">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="ExamForge">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ExamForge - Dashboard">
    <meta name="twitter:description" content="Discipline. Direction. Distinction. Practice exams, track your progress, and ace your tests with confidence.">
    <meta name="twitter:image" content="https://examforge.com.ng/examforge.jpeg">
    <title>ExamForge | Dashboard</title>
    <link rel="icon" type="image/png" href="logo-examforge.png">
    <link rel="apple-touch-icon" href="logo-examforge.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round&display=block" rel="stylesheet">
    <link rel="preload" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round&display=block" as="style">
    <link rel="stylesheet" href="app.css?v=5">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/ios/180.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/ios/152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/ios/180.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/ios/167.png">
    <script>
        const savedTheme = localStorage.getItem('examforge-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>

<body>
    <div class="overlay" id="overlay"></div>
    <div class="app-shell">

        <!-- TOP BAR -->
        <header class="topbar">
            <button class="menu-btn" id="menuBtn" aria-label="Toggle sidebar">
                <span class="material-icons-round">menu</span>
            </button>

            <a class="topbar-logo" href="#">
                <img src="512.png" alt="ExamForge">
                <span class="wordmark">Exam<span>forge</span></span>
            </a>

            <div class="topbar-search">
                <div class="search-box">
                    <span class="material-icons-round">search</span>
                    <input type="text" id="globalSearch" placeholder="Search course code or title..."
                        autocomplete="off">
                </div>
            </div>

            <!-- Mobile search toggle (visible only on small screens) -->
            <button class="mobile-search-btn icon-btn" id="mobileSearchBtn" aria-label="Search">
                <span class="material-icons-round">search</span>
            </button>

            <div class="topbar-actions">
                <label class="theme-switch" title="Toggle Dark/Light Mode">
                    <input type="checkbox" class="theme-toggle-checkbox">
                    <span class="slider">
                        <span class="material-icons-round icon-light">light_mode</span>
                        <span class="material-icons-round icon-dark">dark_mode</span>
                    </span>
                </label>

                <!-- Notifications -->
                <button class="icon-btn" data-view="inbox" aria-label="Notifications">
                    <span class="material-icons-round">notifications</span>
                    <span class="notif-badge"></span>
                </button>

                <!-- Profile -->
                <div class="avatar" id="profileBtn" data-view="settings" aria-label="Profile">--</div>
            </div>
        </header>

        <!-- MAIN LAYOUT -->
        <div class="main-wrap">

            <!-- SIDEBAR -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-inner">

                    <span class="nav-section">Main</span>

                    <button class="nav-item active" data-view="dashboard">
                        <span class="material-icons-round">dashboard</span>
                        <span class="nav-text">Dashboard</span>
                    </button>

                    <button class="nav-item" data-view="library">
                        <span class="material-icons-round">local_library</span>
                        <span class="nav-text">Exam Library</span>
                    </button>

                    <button class="nav-item" data-view="subscriptions">
                        <span class="material-icons-round">card_membership</span>
                        <span class="nav-text">Subscriptions</span>
                    </button>

                    <button class="nav-item" data-view="schedule">
                        <span class="material-icons-round">calendar_month</span>
                        <span class="nav-text">Schedule</span>
                    </button>

                    <button class="nav-item" data-view="results">
                        <span class="material-icons-round">analytics</span>
                        <span class="nav-text">Results</span>
                    </button>
                    <button class="nav-item" data-view="master" id="nav-master" style="display: none;">
                        <span class="material-icons-round">admin_panel_settings</span>
                        <span class="nav-text">Master Control</span>
                    </button>
                    <div class="nav-divider"></div>
                    <span class="nav-section">Account</span>

                    <button class="nav-item" data-view="settings">
                        <span class="material-icons-round">person_outline</span>
                        <span class="nav-text">Profile</span>
                    </button>

                    <div class="nav-spacer"></div>

                    <div class="sidebar-footer">
                        <div class="status-row">
                            <div class="status-dot"></div>
                            <span class="status-label">System online</span>
                        </div>
                        <button class="nav-item logout-btn" id="logoutBtn">
                            <span class="material-icons-round">logout</span>
                            <span class="nav-text">Log out</span>
                        </button>
                    </div>

                </div>
            </aside>

            <!-- WORKSPACE -->
            <main class="workspace" id="workspace">
                <!-- Content rendered by JS -->
            </main>

        </div>
    </div>

    <nav class="bottom-nav" id="bottomNav" aria-label="Mobile navigation">
        <button class="bottom-nav-item" data-view="dashboard" aria-label="Dashboard">
            <span class="material-icons-round">dashboard</span>
            <span class="bottom-nav-label">Home</span>
        </button>
        <button class="bottom-nav-item" data-view="library" aria-label="Exam Library">
            <span class="material-icons-round">local_library</span>
            <span class="bottom-nav-label">Library</span>
        </button>
        <button class="bottom-nav-item" data-view="subscriptions" aria-label="Subscriptions">
            <span class="material-icons-round">card_membership</span>
            <span class="bottom-nav-label">Plans</span>
        </button>
        <button class="bottom-nav-item" data-view="schedule" aria-label="Schedule">
            <span class="material-icons-round">calendar_month</span>
            <span class="bottom-nav-label">Schedule</span>
        </button>
        <button class="bottom-nav-item" data-view="results" aria-label="Results">
            <span class="material-icons-round">analytics</span>
            <span class="bottom-nav-label">Results</span>
        </button>
        <button class="bottom-nav-item" data-view="master" id="nav-master-bottom" style="display:none;" aria-label="Admin">
            <span class="material-icons-round">admin_panel_settings</span>
            <span class="bottom-nav-label">Admin</span>
        </button>
    </nav>

    <!-- MOBILE SEARCH OVERLAY -->
    <div class="search-overlay" id="searchOverlay">
        <div class="search-box">
            <span class="material-icons-round">search</span>
            <input type="text" id="mobileSearchInput" placeholder="Search course code or title..." autocomplete="off">
        </div>
    </div>

    <script>
        // Register the Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('Service Worker registered successfully with scope:', registration.scope);
                    })
                    .catch((error) => {
                        console.error('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
    <script src="app.js?v=5" type="module"></script>
</body>

</html>
