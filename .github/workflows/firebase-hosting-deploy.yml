# This workflow deploys to Firebase Hosting on pushes to the main branch.
# It requires the following secrets to be set in your GitHub repository:
#   - FIREBASE_SERVICE_ACCOUNT: Your Firebase service account JSON key
#     (Get this from Firebase Console > Project Settings > Service Accounts > Generate new private key)

name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install dependencies (root)
        run: npm ci
        continue-on-error: true

      - name: Install dependencies (functions)
        working-directory: functions
        run: npm ci
        continue-on-error: true

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: examforge-7f1b9
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
