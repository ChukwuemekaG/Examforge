<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="ExamForge - Sign In">
    <meta property="og:description" content="Prepare smarter with ExamForge. Practice exams, track your progress, and ace your tests with confidence.">
    <meta property="og:image" content="https://examforge.app/examforge.jpeg">
    <meta property="og:url" content="https://examforge.app">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="ExamForge">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ExamForge - Sign In">
    <meta name="twitter:description" content="Prepare smarter with ExamForge. Practice exams, track your progress, and ace your tests with confidence.">
    <meta name="twitter:image" content="https://examforge.app/examforge.jpeg">
    <title>Examforge | Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <link rel="icon" type="image/png" href="logo-examforge.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="logo-examforge.png">
    <link rel="apple-touch-icon" href="/icons/ios/180.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/ios/152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/ios/180.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/ios/167.png">
     <script>
        const savedTheme = localStorage.getItem('examforge-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <script>
    // 1. Check if the "hint" exists
    if (localStorage.getItem('ef_logged_in') === 'true') {
        // 2. Immediately hide the body content to prevent the flash
        document.documentElement.style.display = 'none';
        // 3. Redirect to the app
        window.location.href = '/app.html';
    }
</script>
</head>

<body>

    <div class="auth-wrapper">

        <main class="auth-panel">
            <div class="form-container">

                <div class="mobile-header">
                    <a href="/" class="back-link">&larr; RETURN</a>
                    <h2>SIGN IN</h2>
                </div>

                <div class="auth-tabs">
                    <button class="tab-btn active" id="tabLogin">[ I'M NOT NEW ]</button>
                    <button class="tab-btn" id="tabRegister">[ I AM NEW ]</button>
                </div>

                <form id="formLogin" class="sharp-form active-form">
                    <div class="form-header">
                        <h3>EXISTING USER</h3>
                        <p>Enter your credentials to access Examforge.</p>
                    </div>

                    <div class="input-group">
                        <label for="loginIdentifier">USERNAME OR EMAIL</label>
                        <input type="text" id="loginIdentifier" placeholder="username or student@university.edu"
                            required>
                    </div>

                    <div class="input-group">
                        <label for="loginPassword">PASSWORD</label>
                        <div class="password-wrapper">
                            <input type="password" id="loginPassword" placeholder="••••••••" required>
                            <button type="button" class="toggle-password" aria-label="Toggle password visibility"
                                onclick="togglePassword('loginPassword', this)">
                                <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                                <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" style="display:none">
                                    <path
                                        d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                                    <line x1="1" y1="1" x2="23" y2="23" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div id="loginFeedback" class="error-box"></div>
                    <div class="form-actions">
                        <button type="submit" class="btn-sharp-solid full-width">CONTINUE</button>

                        <div class="auth-divider"><span>OR</span></div>

                        <!-- GOOGLE AUTH DISABLED
                        <button type="button" class="btn-google full-width btn-google-login">
                            <svg class="google-icon" viewBox="0 0 24 24">
                                <path
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                    fill="#4285F4" />
                                <path
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                    fill="#34A853" />
                                <path
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                                    fill="#FBBC05" />
                                <path
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                    fill="#EA4335" />
                            </svg>
                            CONTINUE WITH GOOGLE
                        </button>
                        -->

                        <a href="#" class="forgot-link">FORGOT PASSWORD?</a>
                    </div>
                </form>

                <form id="formRegister" class="sharp-form">
                    <div class="form-header">
                        <h3>NEW RECRUIT</h3>
                        <p>Set up your profile to enter the system.</p>
                    </div>

                    <div class="input-group">
                        <label for="regName">FULL NAME</label>
                        <input type="text" id="regName" placeholder="e.g. John Doe" required>
                    </div>

                    <div class="input-group">
                        <label for="regUsername">USERNAME</label>
                        <input type="text" id="regUsername" placeholder="e.g. johndoe42" required>
                    </div>

                    <div class="input-group">
                        <label for="regEmail">EMAIL ADDRESS</label>
                        <input type="email" id="regEmail" placeholder="student@university.edu" required>
                    </div>


                    <div class="input-group">
                        <label for="regPassword">PASSWORD</label>
                        <div class="password-wrapper">
                            <input type="password" id="regPassword" placeholder="Minimum 8 characters" required>
                            <button type="button" class="toggle-password" aria-label="Toggle password visibility"
                                onclick="togglePassword('regPassword', this)">
                                <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                                <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" style="display:none">
                                    <path
                                        d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                                    <line x1="1" y1="1" x2="23" y2="23" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div id="regFeedback" class="error-box"></div>
                    <div class="form-actions">
                        <button type="submit" class="btn-sharp-solid full-width">CREATE PROFILE</button>

                        <div class="auth-divider"><span>OR</span></div>

                        <!-- GOOGLE AUTH DISABLED
                        <button type="button" class="btn-google full-width btn-google-reg">
                            <svg class="google-icon" viewBox="0 0 24 24">
                                <path
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                    fill="#4285F4" />
                                <path
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                    fill="#34A853" />
                                <path
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                                    fill="#FBBC05" />
                                <path
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                    fill="#EA4335" />
                            </svg>
                            SIGN UP WITH GOOGLE
                        </button>
                        -->
                    </div>
                </form>

            </div>
        </main>
    </div>
    <div id="loadingScreen" class="loading-overlay">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>
    <style>
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            width: 100%;
            padding-right: 2.8rem;
            box-sizing: border-box;
        }

        .toggle-password {
            position: absolute;
            right: 0.75rem;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            color: inherit;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .toggle-password:hover {
            opacity: 1;
        }

        .eye-icon {
            width: 1.1rem;
            height: 1.1rem;
        }
    </style>
    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            btn.querySelector('.eye-open').style.display = isPassword ? 'none' : '';
            btn.querySelector('.eye-closed').style.display = isPassword ? '' : 'none';
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Make sure the path matches where you save your sw.js file
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('Service Worker registered successfully with scope:', registration.scope);
                    })
                    .catch((error) => {
                        console.error('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
    <script type="module" src="login.js"></script>
</body>

</html>
